services:
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins.Dockerfile
    image: mlops-jenkins:lts
    container_name: mlops-jenkins
    user: root
    ports:
      - "8091:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
      - /mnt/d/ws/MLOps:/mnt/d/ws/MLOps
    restart: unless-stopped

volumes:
  jenkins_home:
