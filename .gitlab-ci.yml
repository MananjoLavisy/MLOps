stages:
  - lint
  - test
  - build
  - scan
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  IMAGE_TAG: "$DOCKERHUB_NAMESPACE/mlops-fastapi:$CI_COMMIT_SHORT_SHA"

cache:
  paths:
    - .cache/pip

default:
  before_script:
    - python --version

lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - flake8 src tests
    - black --check src tests

test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - pytest

build_image:
  stage: build
  image: docker:27.0.3
  services:
    - docker:27.0.3-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -f docker/Dockerfile -t "$IMAGE_TAG" .
    - docker save "$IMAGE_TAG" -o app-image.tar
  artifacts:
    paths:
      - app-image.tar

scan_image:
  stage: scan
  image:
    name: aquasec/trivy:0.53.0
    entrypoint: [""]
  script:
    - trivy image --input app-image.tar --exit-code 1 --severity HIGH,CRITICAL
  needs:
    - build_image

push_image:
  stage: scan
  image: docker:27.0.3
  services:
    - docker:27.0.3-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker load -i app-image.tar
    - docker login "$DOCKER_REGISTRY" -u "$DOCKER_REGISTRY_USERNAME" -p "$DOCKER_REGISTRY_PASSWORD"
    - docker push "$IMAGE_TAG"
  needs:
    - build_image

deploy_staging:
  stage: deploy
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y openssh-client
    - pip install ansible
    - mkdir -p ~/.ssh
    - printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - ansible-galaxy collection install -r ansible/requirements.yml
    - ansible-playbook -i ansible/inventories/staging/hosts.ini ansible/playbooks/deploy.yml --private-key ~/.ssh/id_rsa -e image_name="$IMAGE_TAG" -e docker_registry="$DOCKER_REGISTRY" -e docker_registry_username="$DOCKER_REGISTRY_USERNAME" -e docker_registry_password="$DOCKER_REGISTRY_PASSWORD"
  only:
    - main
